services:
  # ─── Backend: Spring Boot ────────────────────────────────────────────────────
  - type: web
    name: finance-system-backend
    runtime: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/dashboard-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/auth/health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false   # Set this in Render dashboard → your MySQL connection string
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false   # Set to your frontend Render URL e.g. https://finance-frontend.onrender.com
      - key: JAVA_VERSION
        value: "17"

  # ─── Frontend: React/Vite Static Site ───────────────────────────────────────
  - type: web
    name: finance-system-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        sync: false   # Set to your backend Render URL e.g. https://finance-system-backend.onrender.com/api
