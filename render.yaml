databases:
  # ─── Render Free PostgreSQL ───────────────────────────────────────────────────
  - name: finance-db
    databaseName: finance_db
    user: finance_user
    plan: free

services:
  # ─── Backend: Spring Boot via Docker ─────────────────────────────────────────
  - type: web
    name: finance-system-backend
    env: docker
    region: oregon
    plan: free
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false   # IMPORTANT: You must paste the frontend URL here in Render UI
      - key: PORT
        value: "8080"

  # ─── Frontend: React/Vite Static Site ────────────────────────────────────────
  - type: web
    name: finance-system-frontend
    env: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        sync: false   # IMPORTANT: You must paste the backend URL here in Render UI
