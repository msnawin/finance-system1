databases:
  # ─── Render Free PostgreSQL ───────────────────────────────────────────────────
  - name: finance-db
    databaseName: finance_db
    user: finance_user
    plan: free

services:
  # ─── Backend: Spring Boot ────────────────────────────────────────────────────
  - type: web
    name: finance-system-backend
    runtime: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/dashboard-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false   # Set this AFTER frontend deploys → paste frontend URL here
      - key: JAVA_VERSION
        value: "17"
      - key: PORT
        value: "8080"

  # ─── Frontend: React/Vite Static Site ───────────────────────────────────────
  - type: web
    name: finance-system-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        sync: false   # Set this → paste backend URL e.g. https://finance-system-backend.onrender.com/api
