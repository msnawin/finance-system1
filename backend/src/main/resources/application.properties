spring.application.name=finance-dashboard
server.port=${PORT:8080}

# ── Database (PostgreSQL — Render provides DATABASE_URL automatically) ─────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/finance_db}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── CORS ──────────────────────────────────────────────────────────────────────
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.finance=INFO
