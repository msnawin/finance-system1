spring.application.name=finance-dashboard
server.port=${PORT:8080}

# 🛡️ Manual Data Source (Configuration in DataSourceConfig.java) ─────────────
# This replaces the automatic DataSource auto-configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# 🛡️ Manual Dialect (Ensures Hibernate doesn't try to auto-detect and fail)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 🛡️ HikariCP Optimizations for Render
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── CORS ──────────────────────────────────────────────────────────────────────
allowed.origins=${ALLOWED_ORIGINS}
